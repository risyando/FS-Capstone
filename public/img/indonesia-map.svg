<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Peta Indonesia" preserveAspectRatio="xMidYMid meet">
  <title>Peta Indonesia (representasi sederhana)</title>
  <defs>
    <!-- Region fill: soft gray gradient -->
    <linearGradient id="regionFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a4150" stop-opacity="0.95" />
      <stop offset="60%" stop-color="#222731" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#161a23" stop-opacity="0.95" />
    </linearGradient>

    <!-- Region hover fill: bright silver gradient -->
    <linearGradient id="regionFillHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f4f5f7" />
      <stop offset="100%" stop-color="#9aa3b2" />
    </linearGradient>

    <!-- Sea background: subtle vertical gradient -->
    <radialGradient id="seaBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"  stop-color="#0f1320" stop-opacity="0.0" />
      <stop offset="70%" stop-color="#070a12" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#03060c" stop-opacity="0.65" />
    </radialGradient>

    <!-- Glow filter applied on hover -->
    <filter id="regionGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Pin pulse halo gradient -->
    <radialGradient id="pinHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="60%" stop-color="#c9ccd3" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#c9ccd3" stop-opacity="0" />
    </radialGradient>

    <style><![CDATA[
      .region {
        fill: url(#regionFill);
        stroke: rgba(255, 255, 255, 0.22);
        stroke-width: 1;
        cursor: pointer;
        transition: fill .25s ease, stroke .25s ease, filter .25s ease, transform .25s ease;
        transform-origin: center;
        transform-box: fill-box;
      }
      .region:hover {
        fill: url(#regionFillHover);
        stroke: rgba(255, 255, 255, 0.8);
        filter: url(#regionGlow);
        transform: scale(1.015);
      }
      .label {
        font-size: 11px;
        fill: #cfd3dc;
        font-weight: 700;
        pointer-events: none;
        letter-spacing: .3px;
        paint-order: stroke fill;
        stroke: rgba(0, 0, 0, 0.55);
        stroke-width: 2.4;
      }
      .label-sm { font-size: 10px; }
      .pin-dot { fill: #ffffff; }
      .pin-halo { fill: url(#pinHalo); transform-origin: center; transform-box: fill-box; }
      @keyframes pinPulse {
        0%   { transform: scale(0.6); opacity: 0.85; }
        70%  { transform: scale(2.0); opacity: 0;    }
        100% { transform: scale(2.0); opacity: 0;    }
      }
      .pin-halo { animation: pinPulse 2.6s ease-out infinite; }
      .pin-halo.delay-1 { animation-delay: .4s; }
      .pin-halo.delay-2 { animation-delay: .9s; }
      .pin-halo.delay-3 { animation-delay: 1.4s; }
    ]]></style>
  </defs>

  <!-- Ambient sea backdrop -->
  <rect x="0" y="0" width="1000" height="460" fill="url(#seaBg)" />

  <g font-family="-apple-system, Segoe UI, Roboto, Arial, sans-serif">
    <!-- Sumatera -->
    <path class="region" data-province="Sumatera Utara" d="M40,90 L150,70 L180,150 L120,210 L60,200 Z" />
    <text class="label" x="100" y="150" text-anchor="middle">Sumatera Utara</text>

    <path class="region" data-province="Sumatera Selatan" d="M120,210 L230,180 L260,260 L180,300 L80,280 Z" />
    <text class="label" x="170" y="240" text-anchor="middle">Sumatera Selatan</text>

    <path class="region" data-province="Lampung" d="M180,300 L280,280 L300,340 L210,360 Z" />
    <text class="label" x="240" y="328" text-anchor="middle">Lampung</text>

    <!-- Java -->
    <path class="region" data-province="DKI Jakarta" d="M300,340 L360,330 L370,360 L310,370 Z" />
    <text class="label label-sm" x="335" y="354" text-anchor="middle">DKI Jakarta</text>

    <path class="region" data-province="Jawa Barat" d="M340,340 L430,330 L440,370 L350,380 Z" />
    <text class="label label-sm" x="390" y="362" text-anchor="middle">Jawa Barat</text>

    <path class="region" data-province="Jawa Tengah" d="M430,330 L520,330 L530,370 L440,380 Z" />
    <text class="label label-sm" x="480" y="358" text-anchor="middle">Jawa Tengah</text>

    <path class="region" data-province="DI Yogyakarta" d="M510,360 L555,355 L565,385 L515,388 Z" />
    <text class="label label-sm" x="538" y="375" text-anchor="middle">DIY</text>

    <path class="region" data-province="Jawa Timur" d="M530,330 L630,330 L640,375 L540,385 Z" />
    <text class="label label-sm" x="585" y="358" text-anchor="middle">Jawa Timur</text>

    <!-- Bali / NTB / NTT -->
    <path class="region" data-province="Bali" d="M640,355 L680,350 L685,375 L645,380 Z" />
    <text class="label label-sm" x="662" y="370" text-anchor="middle">Bali</text>

    <path class="region" data-province="Nusa Tenggara Barat" d="M700,350 L760,345 L770,380 L705,385 Z" />
    <text class="label label-sm" x="735" y="370" text-anchor="middle">NTB</text>

    <path class="region" data-province="Nusa Tenggara Timur" d="M780,350 L880,345 L890,390 L785,395 Z" />
    <text class="label" x="833" y="373" text-anchor="middle">NTT</text>

    <!-- Kalimantan -->
    <path class="region" data-province="Kalimantan Barat" d="M310,180 L420,170 L420,260 L320,270 Z" />
    <text class="label" x="368" y="222" text-anchor="middle">Kalimantan Barat</text>

    <path class="region" data-province="Kalimantan Tengah" d="M420,170 L500,170 L510,260 L420,260 Z" />
    <text class="label" x="465" y="220" text-anchor="middle">Kalteng</text>

    <path class="region" data-province="Kalimantan Selatan" d="M510,200 L570,200 L575,265 L510,260 Z" />
    <text class="label" x="540" y="236" text-anchor="middle">Kalsel</text>

    <path class="region" data-province="Kalimantan Timur" d="M500,90 L590,90 L600,200 L510,200 Z" />
    <text class="label" x="548" y="150" text-anchor="middle">Kaltim</text>

    <!-- Sulawesi -->
    <path class="region" data-province="Sulawesi Utara" d="M650,90 L720,90 L725,140 L660,150 Z" />
    <text class="label" x="688" y="120" text-anchor="middle">Sulawesi Utara</text>

    <path class="region" data-province="Sulawesi Tengah" d="M650,150 L720,150 L725,220 L655,225 Z" />
    <text class="label" x="688" y="190" text-anchor="middle">Sulteng</text>

    <path class="region" data-province="Sulawesi Selatan" d="M655,225 L720,220 L725,290 L660,290 Z" />
    <text class="label" x="690" y="260" text-anchor="middle">Sulsel</text>

    <!-- Maluku -->
    <path class="region" data-province="Maluku" d="M770,150 L830,150 L835,220 L775,225 Z" />
    <text class="label" x="803" y="190" text-anchor="middle">Maluku</text>

    <path class="region" data-province="Maluku Utara" d="M770,90 L825,90 L830,140 L775,145 Z" />
    <text class="label label-sm" x="800" y="118" text-anchor="middle">Maluku Utara</text>

    <!-- Papua -->
    <path class="region" data-province="Papua Barat" d="M850,150 L920,150 L925,230 L855,230 Z" />
    <text class="label" x="887" y="195" text-anchor="middle">Papua Barat</text>

    <path class="region" data-province="Papua" d="M925,150 L990,150 L990,260 L925,260 Z" />
    <text class="label" x="958" y="210" text-anchor="middle">Papua</text>

    <!-- Aceh -->
    <path class="region" data-province="Aceh" d="M30,30 L90,40 L70,90 L20,80 Z" />
    <text class="label" x="55" y="62" text-anchor="middle">Aceh</text>

    <!-- Riau -->
    <path class="region" data-province="Riau" d="M150,140 L240,130 L230,180 L140,200 Z" />
    <text class="label" x="190" y="167" text-anchor="middle">Riau</text>
  </g>

  <!-- City pins with pulsing halos for visual interest -->
  <g>
    <!-- Jakarta -->
    <circle class="pin-halo" cx="335" cy="350" r="9" />
    <circle class="pin-dot" cx="335" cy="350" r="2.5" />

    <!-- Surabaya -->
    <circle class="pin-halo delay-1" cx="595" cy="358" r="9" />
    <circle class="pin-dot" cx="595" cy="358" r="2.5" />

    <!-- Makassar -->
    <circle class="pin-halo delay-2" cx="688" cy="270" r="9" />
    <circle class="pin-dot" cx="688" cy="270" r="2.5" />

    <!-- Medan -->
    <circle class="pin-halo delay-3" cx="100" cy="130" r="9" />
    <circle class="pin-dot" cx="100" cy="130" r="2.5" />
  </g>
</svg>
